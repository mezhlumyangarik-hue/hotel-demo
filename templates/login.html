<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Մուտք | Admin Panel</title>
    <style>
        body {
            background: #070a13;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        form {
            background: #0f172a;
            padding: 40px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 320px;
            border: 1px solid #38bdf8;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.2);
        }
        input {
            padding: 12px;
            background: #070a13;
            border: 1px solid #1e293b;
            color: white;
            border-radius: 8px;
            outline: none;
        }
        input:focus {
            border-color: #38bdf8;
        }
        button {
            padding: 12px;
            background: #38bdf8;
            border: none;
            font-weight: bold;
            color: #070a13;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }
        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>
<body>
    <form method="POST">
        <h2 style="color:#38bdf8; text-align:center; margin-bottom: 10px;">ADMIN LOGIN</h2>
        {% if error %}
        <p style="color: #ef4444; font-size: 0.9rem; text-align: center;">{{ error }}</p>
        {% endif %}
        <input type="text" name="username" placeholder="Օգտանուն (admin)" required autocomplete="off">
        <input type="password" name="password" placeholder="Գաղտնաբառ (123)" required autocomplete="off">
        <button type="submit">ՄՈՒՏՔ ԳՈՐԾԵԼ</button>
    </form>
</body>
</html>
